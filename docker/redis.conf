# =============================================================================
# Autenticação
# =============================================================================
requirepass B5k8mRq2nXpW4jLv7sYh9cT

# =============================================================================
# Rede
# =============================================================================
bind 0.0.0.0
protected-mode yes

# =============================================================================
# Persistência — AOF (durável, máximo 1s de perda em falha)
# =============================================================================
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# =============================================================================
# Persistência — RDB (backup periódico no disco)
# =============================================================================
save 900 1
save 300 10
save 60 10000

# =============================================================================
# Memória
# =============================================================================
maxmemory 256mb
# allkeys-lru: remove chaves menos usadas quando atingir o limite
# (garante que o BullMQ nunca perca jobs por falta de memória — ele usa suas
#  próprias chaves como prioritárias, mas o cache pode ser eviccionado)
maxmemory-policy allkeys-lru

# =============================================================================
# Log
# =============================================================================
loglevel notice

# =============================================================================
# Timeouts
# =============================================================================
# Encerra conexões ociosas após 5 minutos
timeout 300
tcp-keepalive 60
